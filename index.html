<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Tehilim Interactif</title>
    <style>
        :root {
            --primary: #2c3e50;
            --highlight: #fff9c4;
            --accent: #3498db;
            --text: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 10px;
            color: var(--text);
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: var(--primary); margin-bottom: 5px; font-size: 1.5rem; }
        .date-info { text-align: center; font-weight: bold; color: var(--accent); margin-bottom: 15px; font-size: 0.95rem; }
        
        /* Design de l'interrupteur (Switch) */
        .toggle-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
            font-weight: bold;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--primary);
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 26px; width: 26px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(26px); }

        table { width: 100%; border-collapse: collapse; }
        th { background: var(--primary); color: white; padding: 12px 8px; font-size: 0.9rem; text-align: left;}
        td { padding: 12px 8px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        
        .today { background-color: var(--highlight) !important; font-weight: bold; border-left: 5px solid #f1c40f; }
        .bar-container { width: 100%; background: #e0e0e0; height: 6px; border-radius: 3px; margin-top: 6px; }
        .bar { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.5s ease-in-out; }
    </style>
</head>
<body>

<div class="container">
    <h1>đź“… Mon Cycle de Tehilim</h1>
    <div id="dateDisplay" class="date-info">Chargement...</div>
    
    <div class="toggle-container">
        <span id="labelMonth" style="color: var(--accent);">1 Mois</span>
        <label class="switch">
            <input type="checkbox" id="modeSwitch">
            <span class="slider"></span>
        </label>
        <span id="labelWeek" style="color: #ccc;">1 Semaine</span>
    </div>
    
    <table id="tehilimTable">
        <thead>
            <tr>
                <th id="thJour">Jour</th>
                <th>Psaumes</th>
                <th>Versets</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    // --- 1. Gestion des Dates (HĂ©braĂŻque et Civile) ---
    const dateObj = new Date();
    
    // Date HĂ©braĂŻque
    const hebrewParts = new Intl.DateTimeFormat('fr-FR-u-ca-hebrew', { day: 'numeric' }).formatToParts(dateObj);
    const hebrewDay = parseInt(hebrewParts.find(p => p.type === 'day').value);
    
    // Jour de la semaine (Dimanche = 1, Lundi = 2 ... Shabbat = 7)
    const jsDay = dateObj.getDay(); 
    const weekDay = jsDay === 0 ? 1 : jsDay + 1; 

    // Affichage de la date complĂ¨te en haut
    const fullFormatter = new Intl.DateTimeFormat('fr-FR-u-ca-hebrew', {weekday:'long', day:'numeric', month:'long'});
    let dateText = fullFormatter.format(dateObj);
    // Majuscule au premier lettre
    dateText = dateText.charAt(0).toUpperCase() + dateText.slice(1);
    document.getElementById('dateDisplay').innerText = "Aujourd'hui : " + dateText;

    // --- 2. Base de DonnĂ©es des deux cycles ---
    const dataMonth = [
        [1, "1 Ă  9", 109], [2, "10 Ă  17", 78], [3, "18 Ă  22", 122], [4, "23 Ă  28", 73], [5, "29 Ă  34", 105],
        [6, "35 Ă  38", 104], [7, "39 Ă  43", 63], [8, "44 Ă  48", 82], [9, "49 Ă  54", 92], [10, "55 Ă  59", 80],
        [11, "60 Ă  65", 73], [12, "66 Ă  68", 64], [13, "69 Ă  71", 67], [14, "72 Ă  76", 95], [15, "77 Ă  78", 93],
        [16, "79 Ă  82", 58], [17, "83 Ă  87", 70], [18, "88 Ă  89", 72], [19, "90 Ă  96", 101], [20, "97 Ă  103", 94],
        [21, "104 Ă  105", 80], [22, "106 Ă  107", 91], [23, "108 Ă  112", 72], [24, "113 Ă  118", 85], [25, "119 (1-96)", 96],
        [26, "119 (97-176)", 80], [27, "120 Ă  134", 101], [28, "135 Ă  139", 88], [29, "140 Ă  144", 59], [30, "145 Ă  150", 80]
    ];

    const dataWeek = [
        ["Dimanche", "1 Ă  29", 393],
        ["Lundi", "30 Ă  50", 386],
        ["Mardi", "51 Ă  72", 353],
        ["Mercredi", "73 Ă  89", 368],
        ["Jeudi", "90 Ă  106", 323],
        ["Vendredi", "107 Ă  119", 376],
        ["Chabbat", "120 Ă  150", 328]
    ];

    // --- 3. Moteur d'affichage ---
    const tbody = document.querySelector("#tehilimTable tbody");
    const modeSwitch = document.getElementById('modeSwitch');

    function renderTable() {
        tbody.innerHTML = ""; // Vider le tableau
        const isWeekly = modeSwitch.checked;
        
        // GĂ©rer le style des labels autour du bouton
        document.getElementById('labelMonth').style.color = isWeekly ? "#ccc" : "var(--accent)";
        document.getElementById('labelWeek').style.color = isWeekly ? "var(--accent)" : "#ccc";
        document.getElementById('thJour').innerText = isWeekly ? "Jour de la semaine" : "Jour du mois";

        const currentData = isWeekly ? dataWeek : dataMonth;
        const maxVerses = isWeekly ? 393 : 122; // Pour proportionner la barre graphique

        currentData.forEach((row, index) => {
            const tr = document.createElement("tr");
            
            // Logique de surlignage
            if (isWeekly) {
                // Pour la semaine, index 0 = Dimanche (1), donc on vĂ©rifie si index + 1 == weekDay
                if (index + 1 === weekDay) tr.className = "today";
            } else {
                // Pour le mois, on garde la logique de la date hĂ©braĂŻque (row[0] est le jour du mois)
                if (row[0] === hebrewDay) tr.className = "today";
            }

            const percentage = (row[2] / maxVerses) * 100;
            tr.innerHTML = `
                <td>${row[0]}</td>
                <td><strong>${row[1]}</strong></td>
                <td>
                    <span style="font-size:0.8rem; color:#666;">${row[2]} versets</span>
                    <div class="bar-container"><div class="bar" style="width: ${percentage}%"></div></div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Ă‰couter les changements sur l'interrupteur
    modeSwitch.addEventListener('change', renderTable);

    // Premier affichage au chargement de la page
    renderTable();

</script>
</body>
</html>
